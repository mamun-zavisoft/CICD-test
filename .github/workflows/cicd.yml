name: Laravel CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate App Key
        run: php artisan key:generate

      - name: Set Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Run Tests
        run: php artisan test

      - name: Upload Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-test-results
          path: test-results.txt

          # ১. প্রথমে একটি খালি sqlite ফাইল তৈরি করুন
      - name: Create Database File
        run: touch database/database.sqlite

      # ২. এনভায়রনমেন্ট ভেরিয়েবলসহ টেস্ট রান করুন
      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test

  deploy:
    needs: test

    runs-on:
      - self-hosted
      - linux
      - ec2
      - laravel

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download Test Artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-test-results

      - name: Display Test Results
        run: cat test-results.txt

      - name: Deploy Application
        run: |
          cd /var/www

          if [ ! -d "auto-clinic" ]; then
            git clone https://github.com/${{ github.repository }}.git auto-clinic
          fi

          cd auto-clinic

          git pull origin main

          composer install --no-interaction --prefer-dist --optimize-autoloader

          cp .env.example .env || true

          php artisan key:generate || true

          chmod -R 777 storage bootstrap/cache

          php artisan migrate --force || true

          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

          php artisan optimize

          echo "Deployment Successful"