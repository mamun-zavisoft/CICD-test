name: Laravel CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2

    - name: Copy .env
      run: cp .env.example .env

    - name: Create SQLite Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Configure Environment
      run: |
        echo "DB_CONNECTION=sqlite" >> .env
        echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env
        echo "CACHE_STORE=file" >> .env
        echo "SESSION_DRIVER=file" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env

    - name: Install Dependencies
      run: composer install --no-interaction --prefer-dist

    - name: Generate App Key
      run: php artisan key:generate

    - name: Clear Caches
      run: |
        php artisan config:clear
        php artisan cache:clear
        php artisan route:clear
        php artisan view:clear

    - name: Set Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run Database Migrations
      run: php artisan migrate --force

    - name: Run Tests
      run: |
        php artisan test | tee test-results.txt

    - name: Upload Test Artifact
      uses: actions/upload-artifact@v4
      with:
        name: laravel-test-results
        path: test-results.txt

  deploy:
    needs: test

    runs-on:
      - self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download Test Artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-test-results

      - name: Display Test Results
        run: cat test-results.txt

      - name: Deploy Application
        run: |
            APP_DIR=/var/www/auto-clinic

            # Clone if project does not exist
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repository..."

              rm -rf $APP_DIR

              git clone https://github.com/${{ github.repository }}.git $APP_DIR
            fi

            cd $APP_DIR

            echo "Pulling latest code..."

            git pull origin main

            composer install --no-interaction --prefer-dist --optimize-autoloader

            # Create env if missing
            if [ ! -f ".env" ]; then
              cp .env.example .env
            fi

            php artisan key:generate || true

            chmod -R 777 storage bootstrap/cache

            php artisan migrate --force || true

            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            php artisan optimize

            echo "Deployment Successful"